
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <title>UltraKey AI | Source Root</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background: #020617; 
        margin: 0;
        height: 100vh;
        overflow: hidden;
      }
      .glass-effect {
        background: rgba(15, 23, 42, 0.7);
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .nebula-bg {
        background: radial-gradient(circle at 0% 0%, rgba(79, 70, 229, 0.15) 0%, transparent 50%),
                    radial-gradient(circle at 100% 100%, rgba(219, 39, 119, 0.15) 0%, transparent 50%),
                    #0f172a;
        background-size: 200% 200%;
        animation: nebula-flow 15s ease infinite;
      }
      @keyframes nebula-flow {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 3px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
      }
      .title-font { font-family: 'Space Grotesk', sans-serif; }
      .pb-safe {
        padding-bottom: env(safe-area-inset-bottom);
      }
    </style>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "@google/genai": "https://esm.sh/@google/genai@1.40.0",
    "react-markdown": "https://esm.sh/react-markdown@9.0.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>
  <body>
    <!-- 
      EMBED INSTRUCTIONS FOR LOCAL SRC FOLDER:
      1. Create 'src' folder.
      2. Move components/, services/, App.tsx, index.tsx, types.ts into 'src/'.
      3. Change the script src below to "src/index.tsx".
    -->
    <div id="ultrakey-messenger-root"></div>
    <script type="module" src="index.tsx"></script>
    
    <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
      <div class="opacity-10 text-center">
        <h1 class="text-white text-6xl font-black uppercase tracking-[1em] mb-4">Source Root</h1>
        <p class="text-white text-sm font-bold tracking-[0.5em] uppercase">Current Directory = src</p>
      </div>
    </div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
